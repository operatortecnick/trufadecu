components:
  schemas:
    CompanyYResponse:
      properties:
        data:
          description: Response data
          type: object
        metadata:
          properties:
            processing_time:
              description: Processing time in seconds
              example: 0.124
              format: float
              type: number
            request_id:
              description: Unique request identifier
              example: req_123456789
              type: string
          type: object
        success:
          description: Indicates if the request was successful
          example: true
          type: boolean
      required:
      - success
      type: object
    CreateUser:
      properties:
        email:
          example: maria@example.com
          format: email
          type: string
        name:
          example: Maria Santos
          type: string
      required:
      - name
      - email
      type: object
    Error:
      properties:
        code:
          description: Error code
          example: 400
          format: int32
          type: integer
        details:
          description: Additional error details
          example: The request body is invalid
          type: string
        message:
          description: Error message
          example: Bad Request
          type: string
        timestamp:
          description: Error timestamp
          format: date-time
          type: string
      required:
      - code
      - message
      - timestamp
      type: object
    Product:
      properties:
        company_x_category:
          example: Electronics
          type: string
        id:
          example: 456
          type: integer
        name:
          example: Product A
          type: string
        price:
          example: 29.99
          format: float
          type: number
      required:
      - id
      - name
      - price
      type: object
    User:
      properties:
        company_x_id:
          example: CX-12345
          type: string
        created_at:
          format: date-time
          type: string
        email:
          example: joao@example.com
          format: email
          type: string
        id:
          example: 123
          type: integer
        name:
          example: "Jo\xE3o Silva"
          type: string
      required:
      - id
      - name
      - email
      type: object
  securitySchemes:
    ApiKeyAuth:
      description: API key for Company Y authentication
      in: header
      name: X-API-Key
      type: apiKey
    BearerAuth:
      bearerFormat: JWT
      description: JWT token for Company Y authentication
      scheme: bearer
      type: http
info:
  contact:
    email: api@company-y.com
    name: Company Y API Team
    url: https://company-y.com/api-docs
  description: This API has been transformed from Company X format to Company Y format.
    It provides the same functionality but adapted for Company Y infrastructure and
    standards.
  title: Company Y API (Transformed from Company X)
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/company-y/products:
    get:
      description: Get all products from Company X catalog
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Product'
                type: array
          description: List of products
        '401': &id001
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized - Invalid API key
        '403': &id002
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden - Insufficient permissions
        '429': &id003
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Too Many Requests - Rate limit exceeded
      security: &id004
      - ApiKeyAuth: []
      summary: List products
      tags: &id005
      - Company Y API
  /api/v1/users:
    get:
      description: Retrieve a list of users from Company X system
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/User'
                type: array
          description: Successful response
        '401': *id001
        '403': *id002
        '429': *id003
        '500':
          description: Internal server error
      security: *id004
      summary: List users
      tags: *id005
    post:
      description: Create a new user in Company X system
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: User created successfully
        '400':
          description: Bad request
        '401': *id001
        '403': *id002
        '429': *id003
      security: *id004
      summary: Create user
      tags: *id005
  /api/v1/users/{userId}:
    get:
      description: Retrieve a specific user by their ID
      parameters:
      - in: path
        name: userId
        required: true
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: User found
        '401': *id001
        '403': *id002
        '404':
          description: User not found
        '429': *id003
      security: *id004
      summary: Get user by ID
      tags: *id005
servers:
- description: Company Y Production Server
  url: https://api.company-y.com/v1
- description: Company Y Staging Server
  url: https://staging-api.company-y.com/v1
- description: Company Y Development Server
  url: https://dev-api.company-y.com/v1
