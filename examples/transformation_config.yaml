transformation_rules:
  info:
    title: 'Company Y API (Transformed from Company X)'
    description: 'This API has been transformed from Company X format to Company Y format. It provides the same functionality but adapted for Company Y infrastructure and standards.'
    version: '1.0.0'
    contact:
      name: 'Company Y API Team'
      email: 'api@company-y.com'
      url: 'https://company-y.com/api-docs'

  servers:
    - url: 'https://api.company-y.com/v1'
      description: 'Company Y Production Server'
    - url: 'https://staging-api.company-y.com/v1'
      description: 'Company Y Staging Server'
    - url: 'https://dev-api.company-y.com/v1'
      description: 'Company Y Development Server'

  paths:
    prefix: '/api/v1'
    replacements:
      - from: 'company-x'
        to: 'company-y'
      - from: 'company_x_'
        to: 'company_y_'
    operations:
      tags:
        - 'Company Y API'
      security:
        - ApiKeyAuth: []
      responses:
        add_defaults:
          '401':
            description: 'Unauthorized - Invalid API key'
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
          '403':
            description: 'Forbidden - Insufficient permissions'
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
          '429':
            description: 'Too Many Requests - Rate limit exceeded'
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'

  components:
    securitySchemes:
      ApiKeyAuth:
        type: apiKey
        in: header
        name: 'X-API-Key'
        description: 'API key for Company Y authentication'
      BearerAuth:
        type: http
        scheme: bearer
        bearerFormat: JWT
        description: 'JWT token for Company Y authentication'

    schemas:
      Error:
        type: object
        properties:
          code:
            type: integer
            format: int32
            description: 'Error code'
            example: 400
          message:
            type: string
            description: 'Error message'
            example: 'Bad Request'
          details:
            type: string
            description: 'Additional error details'
            example: 'The request body is invalid'
          timestamp:
            type: string
            format: date-time
            description: 'Error timestamp'
        required:
          - code
          - message
          - timestamp

      CompanyYResponse:
        type: object
        properties:
          success:
            type: boolean
            description: 'Indicates if the request was successful'
            example: true
          data:
            type: object
            description: 'Response data'
          metadata:
            type: object
            properties:
              request_id:
                type: string
                description: 'Unique request identifier'
                example: 'req_123456789'
              processing_time:
                type: number
                format: float
                description: 'Processing time in seconds'
                example: 0.124
        required:
          - success